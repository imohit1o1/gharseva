name: Deploy gharseva backend

on:
  push:
    branches:
      - main

jobs:

  deploy:

    runs-on: ubuntu-latest

    steps:

    - name: Checkout Code
      uses: actions/checkout@v4


    - name: Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3

      with:

        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}

        key: ${{ secrets.VPS_SSH_KEY }}

        script: |

          cd /opt/apps/gharseva

          git pull origin main

          docker compose down

          docker compose up -d